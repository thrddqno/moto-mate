spring:
  application:
    name: motomate
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/motomate_dev}
    username: ${DB_USERNAME:motomate_admin}
    password: ${DB_PASSWORD:motomate_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        default_schema: moto_mate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: moto_mate

firebase:
  service-account: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

server:
  port: ${PORT:8081}
