services:
  postgres:
    image: postgres:16-alpine
    container_name: motomate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: motomate_dev
      POSTGRES_USER: motomate_admin
      POSTGRES_PASSWORD: motomate_password
    ports:
      - "5432:5432"
    volumes:
      - motomate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motomate_admin -d motomate_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: motomate_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/motomate_dev
      DB_USERNAME: motomate_admin
      DB_PASSWORD: motomate_password
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:?Set FIREBASE_SERVICE_ACCOUNT_BASE64 with base64-encoded Firebase service account JSON}
      DEVICE_TOKEN_ENCRYPTION_KEY_BASE64: ${DEVICE_TOKEN_ENCRYPTION_KEY_BASE64:?Set DEVICE_TOKEN_ENCRYPTION_KEY_BASE64 with openssl rand -base64 32}
      DEVICE_TOKEN_HASH_KEY_BASE64: ${DEVICE_TOKEN_HASH_KEY_BASE64:?Set DEVICE_TOKEN_HASH_KEY_BASE64 with openssl rand -base64 32}
      DEVICE_TOKEN_KEY_VERSION: ${DEVICE_TOKEN_KEY_VERSION:-v1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://localhost:5173}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://192.168.*.*:4173,http://192.168.*.*:5173,https://192.168.*.*:4173,https://192.168.*.*:5173,http://10.*.*.*:4173,http://10.*.*.*:5173,https://10.*.*.*:4173,https://10.*.*.*:5173,http://172.16.*.*:4173,http://172.16.*.*:5173,https://172.16.*.*:4173,https://172.16.*.*:5173,http://172.17.*.*:4173,http://172.17.*.*:5173,https://172.17.*.*:4173,https://172.17.*.*:5173,http://172.18.*.*:4173,http://172.18.*.*:5173,https://172.18.*.*:4173,https://172.18.*.*:5173,http://172.19.*.*:4173,http://172.19.*.*:5173,https://172.19.*.*:4173,https://172.19.*.*:5173,http://172.20.*.*:4173,http://172.20.*.*:5173,https://172.20.*.*:4173,https://172.20.*.*:5173,http://172.21.*.*:4173,http://172.21.*.*:5173,https://172.21.*.*:4173,https://172.21.*.*:5173,http://172.22.*.*:4173,http://172.22.*.*:5173,https://172.22.*.*:4173,https://172.22.*.*:5173,http://172.23.*.*:4173,http://172.23.*.*:5173,https://172.23.*.*:4173,https://172.23.*.*:5173,http://172.24.*.*:4173,http://172.24.*.*:5173,https://172.24.*.*:4173,https://172.24.*.*:5173,http://172.25.*.*:4173,http://172.25.*.*:5173,https://172.25.*.*:4173,https://172.25.*.*:5173,http://172.26.*.*:4173,http://172.26.*.*:5173,https://172.26.*.*:4173,https://172.26.*.*:5173,http://172.27.*.*:4173,http://172.27.*.*:5173,https://172.27.*.*:4173,https://172.27.*.*:5173,http://172.28.*.*:4173,http://172.28.*.*:5173,https://172.28.*.*:4173,https://172.28.*.*:5173,http://172.29.*.*:4173,http://172.29.*.*:5173,https://172.29.*.*:4173,https://172.29.*.*:5173,http://172.30.*.*:4173,http://172.30.*.*:5173,https://172.30.*.*:4173,https://172.30.*.*:5173,http://172.31.*.*:4173,http://172.31.*.*:5173,https://172.31.*.*:4173,https://172.31.*.*:5173}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081/api/v1}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
    container_name: motomate_frontend
    restart: unless-stopped
    ports:
      - "4173:8080"
    depends_on:
      - backend

volumes:
  motomate_pgdata:
